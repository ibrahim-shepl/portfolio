<!DOCTYPE html>
<html lang="en">

<head>
    <title> Contact Us </title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A contact page for students to send messages, feedback, or support requests about the course management system.">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header>
        <h1>Contact Us</h1>
        <p>Send us your questions, feedback, or support requests and we will respond shortly.</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html" title="Go to home page ">Home</a></li>
            <li><a href="courses.html" title="Go to courses page">My Courses</a></li>
            <li><a href="add-course.html" title="Go to add-course page">Add Course</a></li>
            <li><a href="contact.html" title="Go to contact page">Contact Us</a></li>
        </ul>
    </nav>

    <br>

    <main>

        <section>

            <h2>Get in Touch</h2>

            <div class="contact-info">
                <p>
                    &#9993;
                    <a href="mailto:support@education-organizer.com" title="send message to me">
                        support@education-organizer.com
                    </a>
                </p>
                <p>&#128222; +20 155 069 5895</p>
            </div>

            <div class="box">

                <form class="contact-form">

                    <label for="name">Name:</label><br>
                    <input id="name" name="fullName" type="text" placeholder="Enter Your Name" required /><br>
                    <br>
                    <label for="email">Email:</label><br>
                    <input id="email" name="email" type="email" placeholder="Enter Your Official Email" required /><br>
                    <br>
                    <label for="message">Message:</label><br>
                    <textarea id="message" name="message" rows="5" cols="30" placeholder="Enter Your Message Here...."
                        required></textarea><br>
                    <br>
                    <input type="submit" value="Send Message" />

                </form>

            </div>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Academic Planner. All rights reserved.</p>
    </footer>

</body>

</html>
